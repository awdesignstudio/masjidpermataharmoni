<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast MPH - Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e2e8f0; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { height: 12px; width: 12px; border-radius: 50%; background: #e11d48; cursor: pointer; -webkit-appearance: none; margin-top: -4px; }
        
        .active-track { background-color: #fff1f2; border-color: #fecdd3; }
        .active-track p { color: #be123c; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center">

    <header class="w-full max-w-md bg-white p-4 flex items-center shadow-sm sticky top-0 z-50">
        <a href="index.html" class="text-slate-400 hover:text-rose-600 transition-colors mr-4">
            <i class="fas fa-arrow-left text-lg"></i>
        </a>
        <h1 class="font-bold text-slate-700 text-lg">Podcast MPH</h1>
    </header>

    <main class="w-full max-w-md px-6 py-10 flex flex-col items-center">
        
        <div class="w-64 h-64 bg-gradient-to-br from-rose-500 to-rose-700 rounded-3xl shadow-xl flex items-center justify-center mb-8 relative overflow-hidden group">
            <i class="fas fa-microphone-lines text-white text-8xl opacity-20 absolute transition-transform group-hover:scale-110"></i>
            <div class="z-10 text-center px-4">
                <span class="text-white font-black text-xl tracking-tighter block border-b-2 border-rose-400 pb-1 mb-2">PODCAST</span>
                <p class="text-rose-100 text-[10px] uppercase font-bold tracking-widest">Masjid Permata Harmoni</p>
            </div>
        </div>

        <div class="text-center mb-8">
            <h2 id="song-title" class="text-xl font-bold text-slate-800 leading-tight">Memuat...</h2>
            <p id="song-desc" class="text-slate-500 text-sm mt-2 px-4 italic"></p>
        </div>

        <audio id="main-audio" src=""></audio>

        <div class="w-full space-y-4">
            <div class="w-full">
                <input type="range" id="progress-bar" value="0" step="1" min="0" class="cursor-pointer">
                <div class="flex justify-between text-[10px] font-bold text-slate-400 mt-2">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>

            <div class="flex items-center justify-between px-6">
                <button onclick="prevTrack()" class="text-slate-400 hover:text-rose-600 transition-colors">
                    <i class="fas fa-backward-step text-2xl"></i>
                </button>
                
                <button onclick="togglePlay()" id="play-btn" class="w-16 h-16 bg-rose-600 rounded-full flex items-center justify-center shadow-lg shadow-rose-200 hover:bg-rose-700 transition-all transform active:scale-95">
                    <i id="play-icon" class="fas fa-play text-white text-2xl ml-1"></i>
                </button>

                <button onclick="nextTrack()" class="text-slate-400 hover:text-rose-600 transition-colors">
                    <i class="fas fa-forward-step text-2xl"></i>
                </button>
            </div>
        </div>

        <div class="w-full mt-12">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Daftar Putar</h3>
            <div id="playlist-container" class="space-y-3">
                </div>
        </div>

    </main>

    <script>
        // DATA EPISODE (Tambah episode baru di sini)
        const episodes = [
            {
                title: "Siroh Nabawiyah Part 1",
                desc: "Kisah Perjalanan Nabi Muhammad SAW",
                src: "https://audio.jukehost.co.uk/Odw7DUBeLjmx1F3BJHaY4L5DPGAuWJo1"
            },
            {
                title: "Kehidupan Sosial dengan Al Quran",
                desc: "Bersama kesulitan ada kemudahan (QS. Al-Insyirah)",
                src: "https://audio.jukehost.co.uk/RQECzLwmg4suxAF8bOoFdCiK37DHhekI"
            }
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('main-audio');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');
        const titleEl = document.getElementById('song-title');
        const descEl = document.getElementById('song-desc');
        const playlistContainer = document.getElementById('playlist-container');

        // Inisialisasi Player
        function loadTrack(index) {
            currentTrackIndex = index;
            const track = episodes[currentTrackIndex];
            audio.src = track.src;
            titleEl.innerText = track.title;
            descEl.innerText = track.desc;
            updatePlaylistUI();
        }

        function updatePlaylistUI() {
            playlistContainer.innerHTML = '';
            episodes.forEach((episode, index) => {
                const isActive = index === currentTrackIndex;
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-3 rounded-xl border transition-all cursor-pointer ${isActive ? 'active-track border-rose-200' : 'bg-white border-slate-100 hover:border-rose-200'}`;
                item.onclick = () => {
                    loadTrack(index);
                    togglePlay(true);
                };

                item.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-8 h-8 ${isActive ? 'bg-rose-600' : 'bg-slate-200'} rounded-lg flex items-center justify-center mr-3">
                            <i class="fas ${isActive ? 'fa-volume-high text-white' : 'fa-play text-slate-400'} text-[10px]"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold ${isActive ? 'text-rose-700' : 'text-slate-700'}">${episode.title}</p>
                            <p class="text-[9px] ${isActive ? 'text-rose-400' : 'text-slate-400'}">${isActive ? 'Sedang Diputar' : 'Klik untuk putar'}</p>
                        </div>
                    </div>
                    ${isActive ? '<i class="fas fa-waveform text-rose-300"></i>' : ''}
                `;
                playlistContainer.appendChild(item);
            });
        }

        function togglePlay(forcePlay = false) {
            if (audio.paused || forcePlay) {
                audio.play();
                playIcon.className = 'fas fa-pause text-white text-2xl';
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play text-white text-2xl ml-1';
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % episodes.length;
            loadTrack(currentTrackIndex);
            togglePlay(true);
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + episodes.length) % episodes.length;
            loadTrack(currentTrackIndex);
            togglePlay(true);
        }

        // Update Progress Bar
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progress;
                
                let curMins = Math.floor(audio.currentTime / 60);
                let curSecs = Math.floor(audio.currentTime % 60);
                currentTimeEl.innerText = `${curMins}:${curSecs < 10 ? '0'+curSecs : curSecs}`;
            }
        });

        // Load Duration
        audio.addEventListener('loadedmetadata', () => {
            let durMins = Math.floor(audio.duration / 60);
            let durSecs = Math.floor(audio.duration % 60);
            durationTimeEl.innerText = `${durMins}:${durSecs < 10 ? '0'+durSecs : durSecs}`;
        });

        // Seek Audio
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Auto Next when finished
        audio.addEventListener('ended', nextTrack);

        // Load track pertama saat startup
        loadTrack(0);
    </script>
</body>
</html>
